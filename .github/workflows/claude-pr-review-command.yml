name: Claude PR Review (on demand)

# Escape hatch for the CI-gated automatic review in ci.yml: comment "@claude review"
# on a pull request to force a full /pr-review regardless of CI status. Useful when
# you want feedback before the build/tests finish, or on a PR that can't go green yet.
#
# claude-code-action enforces that only users with WRITE access can trigger it, so
# this can't be abused to burn tokens. issue_comment runs from the default branch
# (main) with full context, and a comment on a PR carries PR context (isPR), so the
# review runs in agent mode with inline comments + a verdict exactly like the
# automatic review. We check out main (trusted) — not the PR head — so this stays on
# trusted code and always uses the in-repo .claude review assets from main; the PR's
# changes are read via `gh pr diff`.
on:
  issue_comment:
    types: [created]

# Least-privilege default; the job opts into more.
permissions:
  contents: read

jobs:
  on-demand-review:
    name: on-demand-review
    # Only top-level PR comments containing "@claude review", AND only from repo
    # collaborators (OWNER/MEMBER/COLLABORATOR) — a cheap pre-filter so a privileged
    # runner doesn't even start for an outside commenter. The action's own
    # write-access check remains the authoritative gate behind this (author_association
    # is a coarse proxy: a COLLABORATOR may be read-only, and the action will still
    # reject them before any review runs).
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '@claude review') &&
      contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    # Use the same group as ci.yml so automatic and manual review runs cannot
    # overlap and make each other's fresh verdict look like a duplicate.
    concurrency:
      group: claude-pr-review-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write # post inline comments and the one formal verdict
      id-token: write # mint the token after validating this trusted workflow
    env:
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      # Default checkout = main (issue_comment runs on the default branch), which
      # carries the current .claude/ review assets. The PR's diff is fetched via gh.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Prepare immutable PR review context
        id: review_context
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail
          metadata_file="$RUNNER_TEMP/claude-pr-review-metadata.json"
          diff_file="$RUNNER_TEMP/claude-pr-review.diff"
          baseline_file="$RUNNER_TEMP/claude-pr-review-baseline.json"

          head_before=$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq '.headRefOid')
          gh pr view "$PR" --repo "$REPO" \
            --json number,title,body,state,isDraft,url,baseRefName,headRefName,headRefOid,author \
            >"$metadata_file"
          gh pr diff "$PR" --repo "$REPO" --color=never >"$diff_file"
          gh api --paginate "repos/$REPO/pulls/$PR/reviews?per_page=100" \
            | jq -s 'if length == 1 and (.[0] | type) == "array" then .[0] else add end' \
            >"$baseline_file"
          head_after=$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq '.headRefOid')

          if [ "$head_before" != "$head_after" ]; then
            echo "::error::PR head changed while review context was being captured; rerun on the new head."
            exit 1
          fi

          echo "head_sha=$head_before" >>"$GITHUB_OUTPUT"
          echo "started_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >>"$GITHUB_OUTPUT"
          echo "metadata_file=$metadata_file" >>"$GITHUB_OUTPUT"
          echo "diff_file=$diff_file" >>"$GITHUB_OUTPUT"
          echo "baseline_file=$baseline_file" >>"$GITHUB_OUTPUT"

      - name: Run framer PR review (on demand — bypasses the CI gate)
        id: review
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1.0.171
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # The PR number comes from the comment's issue number (a PR comment).
          prompt: >-
            /pr-review ${{ github.event.issue.number }} --comment
            --metadata ${{ steps.review_context.outputs.metadata_file }}
            --diff ${{ steps.review_context.outputs.diff_file }}
          settings: |
            {
              "env": {
                "CLAUDE_CODE_DISABLE_BACKGROUND_TASKS": "1"
              }
            }
          claude_args: |
            --allowedTools "Agent,Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr review:*)"
            --model "claude-opus-4-8"

      - name: Verify Claude's review verdict
        if: ${{ always() }}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.issue.number }}
          EXPECTED_HEAD: ${{ steps.review_context.outputs.head_sha }}
          REVIEW_STARTED_AT: ${{ steps.review_context.outputs.started_at }}
          BASELINE_REVIEWS: ${{ steps.review_context.outputs.baseline_file }}
        run: |
          set -euo pipefail
          if [ -z "$EXPECTED_HEAD" ] || [ -z "$REVIEW_STARTED_AT" ] \
            || [ -z "$BASELINE_REVIEWS" ] || [ ! -f "$BASELINE_REVIEWS" ]; then
            echo "::error::Review context was not prepared; Claude review cannot be verified."
            exit 1
          fi

          current_head=$(gh pr view "$PR" --repo "$REPO" --json headRefOid --jq '.headRefOid')
          if [ "$current_head" != "$EXPECTED_HEAD" ]; then
            echo "::error::PR head changed during Claude review (expected $EXPECTED_HEAD, found $current_head); rerun review."
            exit 1
          fi

          reviews_file="$RUNNER_TEMP/claude-pr-review-after.json"
          gh api --paginate "repos/$REPO/pulls/$PR/reviews?per_page=100" \
            | jq -s 'if length == 1 and (.[0] | type) == "array" then .[0] else add end' \
            >"$reviews_file"

          mapfile -t stale_review_ids < <(jq -r --arg head "$EXPECTED_HEAD" '
            .[]
              | select((.user.login | ascii_downcase | startswith("claude"))
                  and .state == "CHANGES_REQUESTED"
                  and (.commit_id // "") != $head)
              | .id
          ' "$reviews_file")
          if [ "${#stale_review_ids[@]}" -gt 0 ]; then
            echo "Dismissing ${#stale_review_ids[@]} stale Claude change-request review(s) from earlier commits."
            for review_id in "${stale_review_ids[@]}"; do
              if gh api --method PUT "repos/$REPO/pulls/$PR/reviews/$review_id/dismissals" \
                -f message="Superseded by review of current PR head $EXPECTED_HEAD." >/dev/null; then
                echo "Dismissed stale Claude change-request review $review_id."
              else
                echo "::warning::Could not dismiss stale Claude change-request review $review_id; continuing because it is not on the current PR head."
              fi
            done
          fi

          fresh_verdicts=$(jq -n \
            --slurpfile before "$BASELINE_REVIEWS" \
            --slurpfile after "$reviews_file" \
            --arg head "$EXPECTED_HEAD" \
            --arg started "$REVIEW_STARTED_AT" '
              ($before[0] | map(.id)) as $before_ids
              | [$after[0][]
                  | . as $review
                  | select(
                      ($before_ids | index($review.id) | not)
                      and ($review.user.login | ascii_downcase | startswith("claude"))
                      and (($review.commit_id // "") == $head)
                      and (($review.submitted_at // "") >= $started)
                      and ($review.state == "APPROVED" or $review.state == "CHANGES_REQUESTED")
                    )]
            ')
          fresh_count=$(jq 'length' <<<"$fresh_verdicts")
          if [ "$fresh_count" -ne 1 ]; then
            echo "::error::Expected exactly one fresh Claude verdict on $EXPECTED_HEAD; found $fresh_count."
            exit 1
          fi

          verdict_state=$(jq -r '.[0].state' <<<"$fresh_verdicts")
          verdict_submitted_at=$(jq -r '.[0].submitted_at' <<<"$fresh_verdicts")
          echo "Fresh Claude verdict: state=$verdict_state commit=$EXPECTED_HEAD submitted_at=$verdict_submitted_at"
          if [ "$verdict_state" = "CHANGES_REQUESTED" ]; then
            echo "::error::Claude requested changes on the current PR head — resolve the [blocking] items, then push to re-review."
            exit 1
          fi
          echo "Claude approved the current PR head; merge gate passes."

      - name: Upload review trace to R2 (private)
        if: ${{ always() && env.R2_BUCKET != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # R2 rejects the aws CLI v2 default integrity checksums; only send when required.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          REPO: ${{ github.event.repository.name }}
          EXEC_FILE: ${{ steps.review.outputs.execution_file }}
          PR: ${{ github.event.issue.number }}
        run: |
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            echo "No execution file; nothing to upload."
            exit 0
          fi
          key="${REPO}/pr-${PR}/ondemand-run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}.json"
          aws s3 cp "$EXEC_FILE" "s3://${R2_BUCKET}/${key}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --content-type application/json
          echo "Uploaded trace -> r2://${R2_BUCKET}/${key}"
