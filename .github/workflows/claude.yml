name: Claude Code

# @claude mention responder. Fires when someone types "@claude" in an issue, a
# PR/issue comment, or a PR review. claude-code-action enforces its own gate so
# only users with WRITE access to the repo can actually trigger it — the job
# `if:` below is defense-in-depth so the job (and its minted GitHub App token)
# only spins up when "@claude" is actually present, instead of on every comment.
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

# Least-privilege default for the workflow; the job below opts into more.
permissions:
  contents: read

jobs:
  claude:
    name: claude
    # Two gates, matching the on-demand review (claude-pr-review-command.yml):
    #   1. the body/title must contain "@claude" (but not "@claude review", which the
    #      structured review handles — avoids a double response); and
    #   2. an author_association pre-filter (OWNER/MEMBER/COLLABORATOR) so a privileged
    #      runner doesn't start for an outside actor. The action's own write-access
    #      check is still the authoritative gate. (author_association is coarse: it is
    #      the content author's association — for `issues: assigned` that's the issue
    #      author, not the assigner — but the action's actor write-check covers that.)
    if: |
      (github.event_name == 'issue_comment'
        && contains(github.event.comment.body, '@claude')
        && !contains(github.event.comment.body, '@claude review')
        && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment'
        && contains(github.event.comment.body, '@claude')
        && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review'
        && contains(github.event.review.body, '@claude')
        && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues'
        && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))
        && contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    # Scoped to exactly what the responder needs:
    #   contents: write       — push a fix branch when asked to make a change
    #                           (Claude returns a PR-creation link; it never
    #                           force-pushes, merges, or edits CI — the GitHub
    #                           App has no workflow-write scope).
    #   pull-requests: write  — comment on / update PRs.
    #   issues: write         — comment on issues it was mentioned in.
    #   id-token: write       — mint the short-lived, repo-scoped GitHub App
    #                           token; required for the DEFAULT auth path, not
    #                           only Workload Identity Federation.
    #   actions: read         — read CI run results on PRs to inform its answer.
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          # The action authenticates itself and revokes its minted GitHub App
          # token in a post-step, so it never needs the checkout's stored
          # credentials. Required by zizmor (artipacked).
          persist-credentials: false

      - name: Run Claude Code
        uses: anthropics/claude-code-action@3553f84341b92da26052e28acf1aa898f9511f32 # v1.0.177
        with:
          # Pro/Max subscription token, already stored as a repo secret. No
          # ANTHROPIC_API_KEY exists in this repo, so OAuth is the only path.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # No `prompt:` — leaving it empty selects interactive tag mode, where
          # the @claude comment itself supplies the instructions. The Bash tool
          # stays disabled by default; opt in via claude_args only if needed.
