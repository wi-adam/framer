name: Claude Code Review

# Single-pass automated PR review. One claude-code-action session runs the
# framer-native /pr-review command, which fans out to four reviewer subagents
# (spec/doc consistency, correctness, Rust quality, test coverage), validates
# their findings, and posts one consolidated set of inline comments. The command
# and subagents live in-repo (.claude/commands, .claude/agents) and load from the
# checked-out repo — no external plugin marketplace is fetched at runtime, so the
# whole review is SHA-pinned and self-contained.
#
# Plain `pull_request` is the recommended trigger for PUBLIC repos — NOT
# pull_request_target, which would run with base-repo secrets and risk
# pwn-requests on untrusted PR code. Re-pushes (synchronize) are cheap: the
# command self-skips once it has already reviewed a PR.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

# Least-privilege default for the workflow; the job opts into more.
permissions:
  contents: read

jobs:
  pr-review:
    name: pr-review
    runs-on: ubuntu-latest
    # Fork guard: fork-originated runs get a read-only token with NO secrets, so
    # CLAUDE_CODE_OAUTH_TOKEN would be empty. Skip them rather than fail on every
    # external PR. Same-repo (branch) PRs are still reviewed.
    if: github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: write
      # Required even with the OAuth token: the action mints its short-lived,
      # repo-scoped GitHub App token via OIDC to perform GitHub API calls
      # (posting review comments). Without it the action fails at auth.
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Run framer PR review
        uses: anthropics/claude-code-action@51705da45eecce209d4700538bf8377d5b5fc695 # v1.0.152
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/pr-review ${{ github.event.pull_request.html_url }} --comment"
          # In automation mode the action only installs the inline-comment MCP
          # server when an mcp__github_inline_comment__* tool is in claude_args
          # allowedTools (required to post inline comments). gh pr review lets the
          # command submit its approve / request-changes verdict as claude[bot].
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

      - name: Gate merge on Claude's review verdict
        # Read the formal review claude[bot] just submitted. A request-changes
        # verdict fails this job so the `pr-review` check goes red and can be
        # required in branch protection; an approve — or no verdict, e.g. the
        # bootstrapping PR's workflow-validation skip — passes. `always()` so the
        # gate still evaluates if the review step errored (then there's no fresh
        # verdict and the already-failed step reds the job anyway). The PR number
        # is passed via env, not interpolated into the script (zizmor-safe).
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          state=$(gh pr view "$PR" --json reviews \
            --jq '[.reviews[] | select(.author.login | ascii_downcase | startswith("claude"))] | last | .state // ""')
          echo "Latest claude[bot] review state: ${state:-<none>}"
          if [ "$state" = "CHANGES_REQUESTED" ]; then
            echo "::error::Claude requested changes on this PR — resolve the [blocking] items, then push to re-review."
            exit 1
          fi
          echo "No blocking verdict; merge gate passes."
