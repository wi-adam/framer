name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same branch/PR; let main runs finish so they
# always populate the shared build cache.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Least-privilege default for the whole workflow: the GITHUB_TOKEN is read-only
# and no job here needs more. Any job that ever needs write must opt in with its
# own `permissions:` block rather than widening this default.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # The @ref must match `channel` in rust-toolchain.toml so CI and local
      # builds format and lint identically. Bump both together.
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
        with:
          # Pinned by SHA, so the version can't be inferred from the @ref —
          # state it explicitly. Must match `channel` in rust-toolchain.toml.
          toolchain: "1.93.0"
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - name: Install Linux build deps (eframe / winit / wgpu)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: rustfmt
        run: cargo fmt --all -- --check
      # --all-features so the `cli` and `parallel` paths in framer-render are
      # linted too; --all-targets covers tests, benches, and examples.
      - name: clippy
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  test:
    name: build + test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
        with:
          toolchain: "1.93.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - name: Install Linux build deps (eframe / winit / wgpu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: Build
        run: cargo build --workspace --all-features --locked
      # Runs the headless egui_kittest UI tests on every OS, plus the cli/golden
      # render tests (via --all-features). The GPU↔CPU parity test runs here on
      # macOS (real Metal adapter) and skips on Linux/Windows for lack of one —
      # the dedicated `gpu` job exercises it under software Vulkan.
      - name: Test
        run: cargo test --workspace --all-features --locked

  gpu:
    name: gpu parity (linux / lavapipe)
    needs: lint
    runs-on: ubuntu-latest
    # Point the Vulkan loader at Mesa's lavapipe — a CPU Vulkan driver with full
    # compute support — so the WGSL compute path tracer is validated against the
    # CPU reference on Linux instead of skipping for lack of an adapter. wgpu's
    # backend selection is not env-driven here (gpu_parity builds the instance
    # with Backends::all()); lavapipe is the only ICD installed, and these loader
    # vars are what make request_adapter return it.
    env:
      VK_ICD_FILENAMES: /usr/share/vulkan/icd.d/lvp_icd.json
      VK_DRIVER_FILES: /usr/share/vulkan/icd.d/lvp_icd.json
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@45f5412a0cc5dee553bb061a37369fc8e63fa137 # 1.93.0
        with:
          toolchain: "1.93.0"
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-on-failure: true
      - name: Install build deps + Mesa lavapipe (software Vulkan)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            mesa-vulkan-drivers libvulkan1 vulkan-tools
      - name: Verify lavapipe is active
        # The parity test SKIPS (passes) when no adapter is found, so without
        # this gate a broken Mesa install would turn the job green while testing
        # nothing. Print diagnostics, then hard-fail if no software adapter is
        # present so a real ICD/packaging regression shows up as red.
        run: |
          echo "VK_ICD_FILENAMES=$VK_ICD_FILENAMES"
          ls -l /usr/share/vulkan/icd.d/ || true
          vulkaninfo --summary || true
          if ! vulkaninfo --summary 2>/dev/null | grep -qiE 'llvmpipe|lavapipe'; then
            echo "::error::No lavapipe/llvmpipe Vulkan adapter found; gpu_parity would silently skip."
            exit 1
          fi
      - name: GPU↔CPU parity test
        run: cargo test -p framer-app --test gpu_parity --locked -- --nocapture

  docs:
    name: docs (markdown links)
    runs-on: ubuntu-latest
    # Independent of the Rust build (no toolchain needed) so it reports fast and
    # in parallel. Validates relative links only — external URLs are not fetched.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check markdown links
        run: python3 scripts/check-markdown-links.py

  zizmor:
    name: zizmor (workflow security)
    runs-on: ubuntu-latest
    # Static analysis of our own workflow files: flags unpinned actions, template
    # injection into run: blocks, dangerous triggers, and over-broad token
    # permissions before they ship. Version-pinned; pipx is preinstalled on the
    # ubuntu-latest runner. GH_TOKEN lets zizmor run its online audits.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run zizmor
        run: pipx run zizmor==1.25.2 --persona=regular .github/workflows/
        env:
          GH_TOKEN: ${{ github.token }}

  # Framer's spec-aware PR review, GATED on the rest of CI passing so we never
  # spend (expensive) review tokens on a PR that fails lint/build/tests. It also
  # skips Dependabot-authored PRs: dependency bumps are covered by the normal CI
  # gates, and claude-code-action rejects Dependabot as a non-human actor. It lives
  # here rather than a standalone workflow so `needs:` can depend on those jobs
  # natively: when any fails, the Claude step is skipped (zero tokens) while this
  # job still reports a clean result. The review itself (the /pr-review command +
  # its four reviewer subagents) lives in-repo under .claude/. To review a PR on
  # demand regardless of CI, comment "@claude review" (claude-pr-review-command.yml).
  pr-review:
    name: pr-review
    needs: [lint, test, gpu, docs]
    # always() so the job runs — and the required `pr-review` check reports — even
    # when a dependency failed; the gate step below decides whether to actually
    # review. Scoped to same-repo PRs (fork runs get no secrets; push/dispatch
    # aren't PRs and skip here).
    if: ${{ always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      # Required even with the OAuth token: the action mints its short-lived GitHub
      # App token via OIDC for GitHub API calls (posting comments / the verdict).
      id-token: write
    # R2_BUCKET (a secret) doubles as the on/off switch for private trace upload;
    # in job env because a secret can't be read directly in a step `if:`.
    env:
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
    steps:
      - name: Gate on CI result
        id: gate
        # Spend review tokens only if every gating check passed. needs.*.result is
        # success | failure | cancelled | skipped. If not all green, skip the review
        # steps — this job still succeeds, and the failed checks are what block the
        # merge.
        env:
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
          GPU: ${{ needs.gpu.result }}
          DOCS: ${{ needs.docs.result }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          if [ "$PR_AUTHOR" = "dependabot[bot]" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Dependabot-authored PR — skipping Claude review; ordinary CI remains the merge gate."
          elif [ "$LINT" = success ] && [ "$TEST" = success ] && [ "$GPU" = success ] && [ "$DOCS" = success ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "All gating checks passed — running the review."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "CI not green (lint=$LINT test=$TEST gpu=$GPU docs=$DOCS) — skipping the review to save tokens; the failed check(s) block the merge."
          fi

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: steps.gate.outputs.run == 'true'
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Run framer PR review
        if: steps.gate.outputs.run == 'true'
        id: review
        uses: anthropics/claude-code-action@a92e7c70a4da9793dc164451d829089dc057a464 # v1.0.159
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: "/pr-review ${{ github.event.pull_request.html_url }} --comment"
          # The inline-comment MCP server installs only when its tool is in
          # claude_args; gh pr review submits the verdict; opus runs the four-subagent
          # fan-out reliably (the sonnet default under-executed it and no-op'd).
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
            --model "claude-opus-4-8"

      - name: Gate merge on Claude's review verdict
        # request-changes → red `pr-review` check (blocks merge). Only when we
        # actually reviewed; if the review was skipped (CI not green) this is skipped
        # and the failed CI checks are the blockers. PR number via env (zizmor-safe).
        if: ${{ always() && steps.gate.outputs.run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          state=$(gh pr view "$PR" --json reviews \
            --jq '[.reviews[] | select(.author.login | ascii_downcase | startswith("claude"))] | last | .state // ""')
          echo "Latest claude[bot] review state: ${state:-<none>}"
          if [ "$state" = "CHANGES_REQUESTED" ]; then
            echo "::error::Claude requested changes on this PR — resolve the [blocking] items, then push to re-review."
            exit 1
          fi
          echo "No blocking verdict; merge gate passes."

      - name: Upload review trace to R2 (private)
        # Sends the full execution transcript to a private R2 bucket (S3-compatible)
        # so runs are debuggable without exposing traces in the public log. Dormant
        # until the R2_BUCKET secret is set. See claude-pr-review-command.yml for the
        # same step.
        if: ${{ always() && steps.gate.outputs.run == 'true' && env.R2_BUCKET != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          # R2 rejects the aws CLI v2 default integrity checksums; only send when required.
          AWS_REQUEST_CHECKSUM_CALCULATION: when_required
          AWS_RESPONSE_CHECKSUM_VALIDATION: when_required
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          REPO: ${{ github.event.repository.name }}
          EXEC_FILE: ${{ steps.review.outputs.execution_file }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            echo "No execution file; nothing to upload."
            exit 0
          fi
          key="${REPO}/pr-${PR}/run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}.json"
          aws s3 cp "$EXEC_FILE" "s3://${R2_BUCKET}/${key}" \
            --endpoint-url "https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com" \
            --content-type application/json
          echo "Uploaded trace -> r2://${R2_BUCKET}/${key}"
